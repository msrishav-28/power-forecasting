databases:
  - name: powergrid-db
    databaseName: powergrid
    user: poweruser
    plan: free

services:
  - type: web
    name: powergrid-eri-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd .. && python train_models_fast.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: powergrid-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.3
